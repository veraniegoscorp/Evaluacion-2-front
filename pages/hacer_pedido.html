<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hacer Pedido</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/hacer_pedido.css">
</head>
<body>
    <div class="container mt-5"> 
        <div class="row justify-content-center">
        <!-- Col-md-8 limita el ancho para que no ocupe toda la pantalla -->
            <div class="col-md-8 bg-dark text-white p-5 rounded-4 shadow-lg text-center">
            
               <h1 class="display-4 text-uppercase fw-bold text-primary mb-4">
                Crea tu pedido aquí
               </h1>
            
               <p class="lead opacity-75">
                Elige tus cafés favoritos y nosotros nos encargamos del resto.
               </p>
            
               <hr class="w-25 mx-auto border-primary opacity-100">
            </div>
        </div>
    </div>

    <div class="ver_cafes">
        <img src="../resources/cafes/Captura de pantalla 2026-05-13 125055.png" title="1500$">
        <img src="../resources/cafes/cafe expresso.png" title="2500$">
        <img src="../resources/cafes/cafe2.png" title="2800$">
    </div>

    <div class="botones_carro">
        <div class="nav-cafe">
            <!-- Pasamos el nombre y el precio como argumentos -->
            <button class="btn-carro" onclick="agregarAlCarro('Espresso', 1500)">Añadir</button>
            <button class="btn-carro" onclick="agregarAlCarro('Latte', 2500)">Añadir</button>
            <button class="btn-carro" onclick="agregarAlCarro('Capuccino', 2800)">Añadir</button>
        </div>
    </div>

    <!-- Sección del Carrito (se muestra antes de comprar) -->
    <div id="seccion-carrito" class="container mt-4 p-3 bg-light rounded shadow-sm" style="display: none;">
        <h4>Tu Pedido</h4>
        <ul id="lista-items" class="list-group mb-3">
            <!-- Aquí aparecerán los cafés -->
        </ul>
        <p class="fw-bold">Total: $<span id="precio-total">0</span></p>
        
        <button class="btn btn-success w-100" onclick="finalizarCompra()">Confirmar Compra</button>
    </div>
    <script src="../java/carrito.js"></script>
</body>
</html>
